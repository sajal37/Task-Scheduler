<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Scheduler — Project & Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Notifications -->
    <div id="notificationArea" class="notification-area"></div>

    <!-- ───────────────────────── AUTH MODAL ───────────────────────── -->
    <div id="authModal" class="modal-overlay active">
      <div class="modal-box auth-box">
        <div class="brand-logo">⚡ Task Scheduler</div>
        <div class="auth-tabs">
          <button
            class="auth-tab active"
            data-tab="login"
            onclick="switchAuthTab('login', this)"
          >
            Sign In
          </button>
          <button
            class="auth-tab"
            data-tab="register"
            onclick="switchAuthTab('register', this)"
          >
            Sign Up
          </button>
        </div>

        <!-- Sign In -->
        <div id="loginPanel" class="auth-panel active">
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                id="loginEmail"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="loginPassword"
                placeholder="••••••••"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-full">
              Sign In
            </button>
          </form>
        </div>

        <!-- Sign Up -->
        <div id="registerPanel" class="auth-panel">
          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="regName" placeholder="John Doe" required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                id="regEmail"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="form-group">
              <label>Password <span class="hint">(min 6 chars)</span></label>
              <input
                type="password"
                id="regPassword"
                placeholder="••••••••"
                required
                minlength="6"
              />
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input
                type="password"
                id="regConfirm"
                placeholder="••••••••"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-full">
              Create Account
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- ───────────────────────── MAIN APP ───────────────────────── -->
    <div id="app" class="app-layout" style="display: none">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">⚡ Task Scheduler</div>
        <nav class="sidebar-nav">
          <a
            class="nav-item active"
            data-view="dashboard"
            onclick="showView('dashboard', this)"
          >
            <span class="nav-icon">📊</span> Dashboard
          </a>
          <a
            class="nav-item"
            data-view="projects"
            onclick="showView('projects', this)"
          >
            <span class="nav-icon">📁</span> Projects
          </a>
          <a
            class="nav-item"
            data-view="mytasks"
            onclick="showView('mytasks', this)"
          >
            <span class="nav-icon">✅</span> My Tasks
          </a>
        </nav>
        <div class="sidebar-user">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebarUserName">User</div>
            <div class="user-email" id="sidebarUserEmail"></div>
          </div>
          <button class="btn-icon" title="Sign out" onclick="signOut()">
            🚪
          </button>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main-content">
        <!-- ── DASHBOARD VIEW ── -->
        <div id="view-dashboard" class="view active">
          <div class="view-header">
            <h1>Dashboard</h1>
            <button class="btn btn-secondary" onclick="loadDashboard()">
              🔄 Refresh
            </button>
          </div>
          <div class="stat-grid" id="dashStats">
            <div class="stat-card stat-blue">
              <div class="stat-num" id="dTotalAssigned">–</div>
              <div class="stat-lbl">Assigned Tasks</div>
            </div>
            <div class="stat-card stat-yellow">
              <div class="stat-num" id="dTodo">–</div>
              <div class="stat-lbl">To Do</div>
            </div>
            <div class="stat-card stat-purple">
              <div class="stat-num" id="dInProgress">–</div>
              <div class="stat-lbl">In Progress</div>
            </div>
            <div class="stat-card stat-green">
              <div class="stat-num" id="dDone">–</div>
              <div class="stat-lbl">Done</div>
            </div>
            <div class="stat-card stat-red">
              <div class="stat-num" id="dOverdue">–</div>
              <div class="stat-lbl">Overdue</div>
            </div>
          </div>
          <h2 class="section-title">Project Progress</h2>
          <div id="dashProjectProgress" class="progress-list"></div>
        </div>

        <!-- ── PROJECTS VIEW ── -->
        <div id="view-projects" class="view">
          <div class="view-header">
            <h1>Projects</h1>
            <button class="btn btn-primary" onclick="openCreateProjectModal()">
              + New Project
            </button>
          </div>
          <div id="projectsGrid" class="projects-grid"></div>

          <!-- Project Detail (inline panel) -->
          <div id="projectDetail" class="project-detail" style="display: none">
            <button
              class="btn btn-secondary btn-sm"
              onclick="closeProjectDetail()"
            >
              ← Back to Projects
            </button>
            <div class="project-detail-header">
              <div>
                <h2 id="pdName"></h2>
                <p id="pdDescription" class="muted"></p>
              </div>
              <div class="role-badge" id="pdRoleBadge"></div>
            </div>

            <!-- Tabs inside project -->
            <div class="inner-tabs">
              <button
                class="inner-tab active"
                onclick="showInnerTab('pdTasks', this)"
              >
                Tasks
              </button>
              <button
                class="inner-tab"
                onclick="showInnerTab('pdMembers', this)"
              >
                Team
              </button>
              <button
                class="inner-tab admin-only"
                onclick="showInnerTab('pdSettings', this)"
              >
                Settings
              </button>
            </div>

            <!-- Tasks tab -->
            <div id="pdTasks" class="inner-tab-content active">
              <div class="tab-toolbar">
                <button
                  class="btn btn-primary btn-sm"
                  onclick="openCreateTaskModal()"
                >
                  + Add Task
                </button>
              </div>
              <div id="pdTaskList" class="task-list"></div>
            </div>

            <!-- Members tab -->
            <div id="pdMembers" class="inner-tab-content">
              <div class="tab-toolbar admin-only">
                <button
                  class="btn btn-primary btn-sm"
                  onclick="openAddMemberModal()"
                >
                  + Add Member
                </button>
              </div>
              <div id="pdMemberList" class="member-list"></div>
            </div>

            <!-- Settings tab -->
            <div id="pdSettings" class="inner-tab-content">
              <form
                id="editProjectForm"
                onsubmit="handleEditProject(event)"
                class="settings-form"
              >
                <div class="form-group">
                  <label>Project Name *</label>
                  <input type="text" id="epName" required maxlength="120" />
                </div>
                <div class="form-group">
                  <label>Description</label>
                  <textarea
                    id="epDescription"
                    rows="3"
                    maxlength="1000"
                  ></textarea>
                </div>
                <div class="form-row-btn">
                  <button type="submit" class="btn btn-primary">
                    Save Changes
                  </button>
                  <button
                    type="button"
                    class="btn btn-danger"
                    onclick="confirmDeleteProject()"
                  >
                    Delete Project
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- ── MY TASKS VIEW ── -->
        <div id="view-mytasks" class="view">
          <div class="view-header">
            <h1>My Tasks</h1>
            <button class="btn btn-secondary" onclick="loadMyTasks()">
              🔄 Refresh
            </button>
          </div>
          <div id="myTasksContainer" class="task-list"></div>
        </div>
      </main>
    </div>

    <!-- ───────────────────────── MODALS ───────────────────────── -->

    <!-- Create Project Modal -->
    <div id="createProjectModal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <div class="modal-header">
          <h2>New Project</h2>
          <button class="btn-close" onclick="closeModal('createProjectModal')">
            ✕
          </button>
        </div>
        <form id="createProjectForm" onsubmit="handleCreateProject(event)">
          <div class="form-group">
            <label>Project Name *</label>
            <input
              type="text"
              id="cpName"
              required
              maxlength="120"
              placeholder="e.g. Website Redesign"
            />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea
              id="cpDescription"
              rows="3"
              maxlength="1000"
              placeholder="Brief description…"
            ></textarea>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal('createProjectModal')"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">
              Create Project
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Create/Edit Task Modal -->
    <div id="taskModal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <div class="modal-header">
          <h2 id="taskModalTitle">New Task</h2>
          <button class="btn-close" onclick="closeModal('taskModal')">✕</button>
        </div>
        <form id="taskForm" onsubmit="handleSaveTask(event)">
          <input type="hidden" id="taskModalId" />
          <div class="form-group">
            <label>Title *</label>
            <input
              type="text"
              id="tmTitle"
              required
              maxlength="140"
              placeholder="Task title"
            />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="tmDescription" rows="2" maxlength="1000"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Priority *</label>
              <select id="tmPriority">
                <option value="LOW">Low</option>
                <option value="MEDIUM" selected>Medium</option>
                <option value="HIGH">High</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="tmStatus">
                <option value="TODO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Due Date</label>
              <input type="date" id="tmDueDate" />
            </div>
            <div class="form-group" id="assigneeGroup">
              <label>Assign To</label>
              <select id="tmAssignee">
                <option value="">Unassigned</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal('taskModal')"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">Save Task</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Add Member Modal -->
    <div id="addMemberModal" class="modal-overlay" style="display: none">
      <div class="modal-box modal-sm">
        <div class="modal-header">
          <h2>Add Team Member</h2>
          <button class="btn-close" onclick="closeModal('addMemberModal')">
            ✕
          </button>
        </div>
        <form id="addMemberForm" onsubmit="handleAddMember(event)">
          <div class="form-group">
            <label>Member Email *</label>
            <input
              type="email"
              id="amEmail"
              required
              placeholder="member@example.com"
            />
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal('addMemberModal')"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">Add Member</button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
