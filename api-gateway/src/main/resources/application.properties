server.port=${PORT:8080}
spring.application.name=api-gateway

# User Service Route
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=task-service
spring.cloud.gateway.routes[1].uri=${TASK_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/projects/**,/api/tasks/**,/api/dashboard/**

# CORS Configuration
spring.cloud.gateway.globalcors.corsConfigurations.[*].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[*].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[*].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[*].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[*].exposedHeaders=Authorization,Content-Type

# Eureka (disabled for Railway)
eureka.client.enabled=false
